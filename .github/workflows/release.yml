name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: "386"
          - goos: linux
            goarch: arm
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: "386"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build awsdac
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BINARY=awsdac
          [ "${{ matrix.goos }}" = "windows" ] && BINARY=awsdac.exe
          go build -ldflags="-s -w" -o "$BINARY" ./cmd/awsdac
          ZIP_NAME="awsdac-${{ steps.version.outputs.VERSION }}_${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "$ZIP_NAME"
          mv "$BINARY" "$ZIP_NAME/"
          zip -r "${ZIP_NAME}.zip" "$ZIP_NAME/"

      - name: Build awsdac-mcp-server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BINARY=awsdac-mcp-server
          [ "${{ matrix.goos }}" = "windows" ] && BINARY=awsdac-mcp-server.exe
          go build -ldflags="-s -w" -o "$BINARY" ./cmd/awsdac-mcp-server
          ZIP_NAME="awsdac-mcp-server-${{ steps.version.outputs.VERSION }}_${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "$ZIP_NAME"
          mv "$BINARY" "$ZIP_NAME/"
          zip -r "${ZIP_NAME}.zip" "$ZIP_NAME/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: "*.zip"

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true

  publish-awsdac:
    name: Publish awsdac to npm
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish awsdac
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-mcp-server:
    name: Publish awsdac-mcp-server to npm
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('npm/mcp-server/package.json'));
            pkg.version = '$VERSION';
            fs.writeFileSync('npm/mcp-server/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish awsdac-mcp-server
        working-directory: npm/mcp-server
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
